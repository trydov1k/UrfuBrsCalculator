services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brs
      POSTGRES_PASSWORD: brs_secret
      POSTGRES_DB: brscalculator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brs -d brscalculator"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=brscalculator;Username=brs;Password=brs_secret
      Jwt__Key: DockerDevSecretKey_ChangeInProduction_32chars!
      Cors__Origins__0: http://localhost:8080
      Cors__Origins__1: http://127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
